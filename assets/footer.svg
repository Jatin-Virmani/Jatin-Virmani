<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 120" width="900" height="120">
  <defs>
    <style>
      .mono { font-family: 'Courier New', Courier, 'Lucida Console', monospace; }
 
      @keyframes appear { from { opacity: 0; } to { opacity: 1; } }
      .l1 { animation: appear 0.05s 0.2s both; }
      .l2 { animation: appear 0.05s 0.9s both; }
      .l3 { animation: appear 0.05s 1.6s both; }
      .l4 { animation: appear 0.05s 2.3s both; }
 
      @keyframes blink { 0%,49%{ opacity:1; } 50%,100%{ opacity:0; } }
      .cursor { animation: blink 1s step-end 2.8s infinite; }
 
      @keyframes scanmove { from { opacity:0.06; } to { opacity:0; } }
 
      /* Fade entire SVG in on load */
      @keyframes fadein { from { opacity:0; } to { opacity:1; } }
      .wrap { animation: fadein 0.4s 0.1s both; }
    </style>
 
    <linearGradient id="scanGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#39d353" stop-opacity="0"/>
      <stop offset="50%"  stop-color="#39d353" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#39d353" stop-opacity="0"/>
    </linearGradient>
  </defs>
 
  <g class="wrap">
    <!-- Background -->
    <rect width="900" height="120" fill="#0d1117" rx="12"/>
 
    <!-- Top border line -->
    <line x1="0" y1="0" x2="900" y2="0" stroke="#21262d" stroke-width="1"/>
 
    <!-- Glow border -->
    <rect x="1" y="1" width="898" height="118" fill="none" stroke="#39d353" stroke-width="1" rx="12" opacity="0.35"/>
 
    <!-- Divider line across top of footer -->
    <line x1="30" y1="22" x2="870" y2="22" stroke="#21262d" stroke-width="0.8"/>
 
    <!-- Line 1: exit command -->
    <g class="l1">
      <text x="30" y="45" class="mono" font-size="13">
        <tspan fill="#39d353">jatin@dev</tspan>
        <tspan fill="#e6edf3">:</tspan>
        <tspan fill="#58a6ff">~/github-profile</tspan>
        <tspan fill="#e6edf3">$ </tspan>
        <tspan fill="#58a6ff">exit</tspan>
      </text>
    </g>
 
    <!-- Line 2: logout -->
    <g class="l2">
      <text x="30" y="65" class="mono" font-size="12">
        <tspan fill="#6e7681">logout</tspan>
        <tspan fill="#21262d">  ·  </tspan>
        <tspan fill="#6e7681">session ended</tspan>
      </text>
    </g>
 
    <!-- Line 3: message -->
    <g class="l3">
      <text x="30" y="85" class="mono" font-size="12">
        <tspan fill="#6e7681">[  </tspan>
        <tspan fill="#e6edf3">Thanks for visiting.</tspan>
        <tspan fill="#6e7681">  ·  </tspan>
        <tspan fill="#39d353">Now go solve a problem.</tspan>
        <tspan fill="#6e7681">  ]</tspan>
      </text>
    </g>
 
    <!-- Line 4: new prompt (empty — session ended) -->
    <g class="l4">
      <text x="30" y="107" class="mono" font-size="13">
        <tspan fill="#39d353">❯ </tspan>
        <tspan fill="#e6edf3"> </tspan>
      </text>
      <rect class="cursor" x="48" y="93" width="9" height="16" fill="#39d353" rx="1" opacity="0.7"/>
    </g>
 
    <!-- Scanline sweep -->
    <rect x="0" width="900" height="50" fill="url(#scanGrad)">
      <animate attributeName="y" from="-50" to="170" dur="5s" repeatCount="indefinite"/>
    </rect>
  </g>
</svg>
