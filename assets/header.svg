<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 310" width="900" height="310">
  <defs>
    <style>
      .mono { font-family: 'Courier New', Courier, 'Lucida Console', monospace; }

      /* Staggered line appearances */
      @keyframes appear { from { opacity: 0; } to { opacity: 1; } }
      .la { animation: appear 0.05s 0.25s both; }
      .lb { animation: appear 0.4s  0.5s  both; }
      .lc { animation: appear 0.05s 1.5s  both; }
      .ld { animation: appear 0.05s 2.1s  both; }
      .le { animation: appear 0.05s 2.6s  both; }
      .lf { animation: appear 0.05s 3.1s  both; }
      .lg { animation: appear 0.05s 3.6s  both; }
      .lh { animation: appear 0.05s 4.1s  both; }

      /* Blinking cursor — starts after everything loads */
      @keyframes blink { 0%,49%{ opacity:1; } 50%,100%{ opacity:0; } }
      .cursor { animation: blink 1s step-end 4.8s infinite; }

      /* Periodic glitch on the big name */
      @keyframes glitch1 {
        0%,91%,100% { opacity:0; }
        92%          { opacity:0.55; }
        93%          { opacity:0; }
        94%          { opacity:0.4; }
        95%          { opacity:0; }
      }
      @keyframes glitch2 {
        0%,93%,100% { opacity:0; }
        94%          { opacity:0.45; }
        95%          { opacity:0; }
        96%          { opacity:0.3; }
        97%          { opacity:0; }
      }
      .g1 { animation: glitch1 9s 2.2s infinite; }
      .g2 { animation: glitch2 9s 2.2s infinite; }
    </style>

    <!-- Scanline gradient (top & bottom fade) -->
    <linearGradient id="scanGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#39d353" stop-opacity="0"/>
      <stop offset="45%"  stop-color="#39d353" stop-opacity="0.055"/>
      <stop offset="100%" stop-color="#39d353" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- ░░ BACKGROUND ░░ -->
  <rect width="900" height="310" fill="#0d1117" rx="12"/>

  <!-- Subtle grid lines -->
  <line x1="0" y1="44" x2="900" y2="44"  stroke="#21262d" stroke-width="0.6"/>

  <!-- ░░ TERMINAL CHROME ░░ -->
  <rect width="900" height="44" fill="#161b22" rx="12"/>
  <rect y="32" width="900" height="12" fill="#161b22"/>

  <!-- macOS traffic light buttons -->
  <circle cx="28" cy="22" r="7" fill="#ff5f57"/>
  <text   x="28"  y="26" font-size="10" fill="#7d1713" text-anchor="middle">✕</text>
  <circle cx="50" cy="22" r="7" fill="#ffbd2e"/>
  <text   x="50"  y="26" font-size="10" fill="#7d5904" text-anchor="middle">−</text>
  <circle cx="72" cy="22" r="7" fill="#28ca41"/>
  <text   x="72"  y="26" font-size="10" fill="#0a5216" text-anchor="middle">⊕</text>

  <!-- Title bar -->
  <text x="450" y="27" class="mono" font-size="12" fill="#8b949e" text-anchor="middle">jatin@dev: ~/github-profile — bash</text>

  <!-- Outer glow border -->
  <rect x="1" y="1" width="898" height="308" fill="none" stroke="#39d353" stroke-width="1.2" rx="12" opacity="0.4"/>

  <!-- ░░ CONTENT ░░ -->

  <!-- Line A: shell command -->
  <g class="la">
    <text x="30" y="73" class="mono" font-size="13">
      <tspan fill="#39d353">❯ </tspan><tspan fill="#58a6ff">init.sh</tspan><tspan fill="#6e7681"> --profile </tspan><tspan fill="#e6edf3">Jatin-Virmani</tspan><tspan fill="#6e7681"> --mode </tspan><tspan fill="#39d353">legendary</tspan>
    </text>
  </g>

  <!-- Line B: loading bar -->
  <g class="lb">
    <text x="30" y="94" class="mono" font-size="12" fill="#6e7681">Loading profile</text>
    <!-- bar bg -->
    <rect x="161" y="82" width="240" height="14" fill="#21262d" rx="3"/>
    <!-- bar fill (SMIL width animation) -->
    <rect x="161" y="82" width="0"   height="14" fill="#39d353" rx="3">
      <animate attributeName="width" from="0" to="240" dur="0.7s" begin="0.5s" fill="freeze"/>
    </rect>
    <text x="410" y="94" class="mono" font-size="12">
      <tspan fill="#39d353"> 100%</tspan><tspan fill="#6e7681">  [</tspan><tspan fill="#39d353">✔ OK</tspan><tspan fill="#6e7681">]</tspan>
    </text>
  </g>

  <!-- Line C: BIG NAME — main layer -->
  <g class="lc">
    <text x="30" y="143" class="mono" font-size="30" font-weight="bold" fill="#e6edf3" letter-spacing="4">JATIN VIRMANI</text>
  </g>
  <!-- Glitch ghost 1: cyan, shifted right -->
  <text class="mono g1" x="36" y="143" font-size="30" font-weight="bold" fill="#58a6ff" letter-spacing="4" opacity="0">JATIN VIRMANI</text>
  <!-- Glitch ghost 2: red, shifted left -->
  <text class="mono g2" x="24" y="144" font-size="30" font-weight="bold" fill="#ff7b72" letter-spacing="4" opacity="0">JATIN VIRMANI</text>

  <!-- Line D: roles -->
  <g class="ld">
    <text x="30" y="167" class="mono" font-size="12">
      <tspan fill="#e6edf3">Competitive Programmer</tspan>
      <tspan fill="#39d353"> ▸ </tspan>
      <tspan fill="#e6edf3">Full-Stack Dev</tspan>
      <tspan fill="#39d353"> ▸ </tspan>
      <tspan fill="#e6edf3">ML Enthusiast</tspan>
      <tspan fill="#39d353"> ▸ </tspan>
      <tspan fill="#e6edf3">Contest Coordinator @ CCMRU</tspan>
    </text>
  </g>

  <!-- Line E: university -->
  <g class="le">
    <text x="30" y="189" class="mono" font-size="12">
      <tspan fill="#f0883e">university</tspan><tspan fill="#6e7681">: </tspan>
      <tspan fill="#e6edf3">Manav Rachna University</tspan>
      <tspan fill="#6e7681">   </tspan>
      <tspan fill="#f0883e">cgpa</tspan><tspan fill="#6e7681">: </tspan>
      <tspan fill="#39d353">9.12 / 10</tspan>
      <tspan fill="#6e7681">   </tspan>
      <tspan fill="#f0883e">batch</tspan><tspan fill="#6e7681">: </tspan>
      <tspan fill="#e6edf3">B.Tech CSE '28</tspan>
      <tspan fill="#6e7681">   🏅 2× Dean's List</tspan>
    </text>
  </g>

  <!-- Line F: CP profiles -->
  <g class="lf">
    <text x="30" y="211" class="mono" font-size="12">
      <tspan fill="#f0883e">cp</tspan><tspan fill="#6e7681">: </tspan>
      <tspan fill="#e6edf3">CodeChef 2★ (1411)</tspan>
      <tspan fill="#6e7681">  ·  </tspan>
      <tspan fill="#e6edf3">Codeforces Active</tspan>
      <tspan fill="#6e7681">  ·  </tspan>
      <tspan fill="#e6edf3">LeetCode 300+ solved</tspan>
    </text>
  </g>

  <!-- Line G: status -->
  <g class="lg">
    <text x="30" y="233" class="mono" font-size="12">
      <tspan fill="#f0883e">status</tspan><tspan fill="#6e7681">: </tspan>
      <tspan fill="#39d353">● OPEN</tspan>
      <tspan fill="#e6edf3">  —  SDE Internships</tspan>
      <tspan fill="#6e7681"> · </tspan>
      <tspan fill="#e6edf3">AI/ML</tspan>
      <tspan fill="#6e7681"> · </tspan>
      <tspan fill="#e6edf3">Hackathons</tspan>
      <tspan fill="#6e7681"> · </tspan>
      <tspan fill="#e6edf3">Open Source</tspan>
    </text>
  </g>

  <!-- Line H: prompt + cursor -->
  <g class="lh">
    <text x="30" y="270" class="mono" font-size="13">
      <tspan fill="#39d353">jatin@dev</tspan>
      <tspan fill="#e6edf3">:</tspan>
      <tspan fill="#58a6ff">~/github-profile</tspan>
      <tspan fill="#e6edf3">$ </tspan>
    </text>
    <!-- Cursor block (positioned after prompt text ends ~x=254) -->
    <rect class="cursor" x="253" y="255" width="9" height="17" fill="#e6edf3" rx="1"/>
  </g>

  <!-- ░░ SCANLINE SWEEP ░░ -->
  <rect x="0" width="900" height="65" fill="url(#scanGrad)">
    <animate attributeName="y" from="-65" to="375" dur="5s" repeatCount="indefinite"/>
  </rect>
</svg>
